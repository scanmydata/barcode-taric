<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>TARIC Lookup</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --border: #e2e8f0;
      --soft: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.24), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.20), transparent 26%),
        linear-gradient(160deg, #0f172a 0%, #111827 50%, #1e293b 100%);
      padding: 24px;
    }
    .shell {
      max-width: 1240px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.30);
      overflow: hidden;
    }
    .hero {
      padding: 28px 28px 18px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(124, 58, 237, 0.10));
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 34px; letter-spacing: -0.03em; }
    .subtitle { margin: 6px 0 0; color: var(--muted); }
    .content { padding: 24px 28px 30px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 18px;
    }
    .field label, .provider label, .search label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(37, 99, 235, 0.75);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    textarea { min-height: 92px; resize: vertical; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
    }
    button:hover { filter: brightness(1.04); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .tabs {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
      padding-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(124, 58, 237, 0.95));
      color: white;
      border-color: transparent;
    }
    .tab-content { display: none; animation: fadeIn .18s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .stack { display: grid; gap: 14px; }
    .row { display: grid; gap: 12px; }
    .row.two { grid-template-columns: 1fr 1fr; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .controls button { flex: 1 1 220px; }
    .secondary { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
    .danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }
    .pill {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.10);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .stats {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0 18px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      padding: 16px;
      text-align: center;
    }
    .stat .value { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
    .stat .label { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .results {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      padding: 16px 18px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
    }
    .card.ok { border-left: 5px solid var(--good); }
    .card.fail { border-left: 5px solid var(--bad); }
    .product-name { font-size: 15px; font-weight: 800; margin-bottom: 10px; }
    .taric { font-size: 30px; font-weight: 900; color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .hs4, .meta, .description { color: var(--muted); margin-top: 6px; }
    .source { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); color: #94a3b8; font-size: 12px; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 120px;
      color: var(--muted);
    }
    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 3px solid rgba(37, 99, 235, 0.15);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .table-wrap {
      overflow: auto;
      max-height: 620px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #334155;
      padding: 14px 12px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    tbody td {
      padding: 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
      font-size: 14px;
    }
    tbody tr:hover { background: #f8fafc; }
    .empty {
      padding: 36px;
      text-align: center;
      color: var(--muted);
    }
    .table-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .table-search { min-width: min(420px, 100%); }
    .table-info { color: var(--muted); font-size: 13px; }
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-buttons button {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      min-width: 70px;
    }
    .action-buttons .edit-btn { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
    .action-buttons .delete-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
    @media (max-width: 960px) {
      .toolbar, .row.two, .stats { grid-template-columns: 1fr; }
      .controls button { flex-basis: 100%; }
      .table-search { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <h1>TARIC Lookup</h1>
      <p class="subtitle">Barcode ή περιγραφή προς EU TARIC με έλεγχο πριν την αποθήκευση.</p>
    </div>
    <div class="content">
      <div class="toolbar">
        <div class="provider">
          <label for="aiProvider">AI Provider</label>
          <select id="aiProvider">
            <option value="auto" selected>Auto</option>
            <option value="openrouter">OpenRouter</option>
            <option value="deepinfra">DeepInfra</option>
            <option value="duckduckgo">DuckDuckGo AI</option>
            <option value="nerve">Nerve</option>
            <option value="pollinations">Pollinations</option>
            <option value="none">No AI</option>
          </select>
        </div>
        <div class="status"><span class="pill">Ready</span><span id="aiStatus">Είστε έτοιμοι</span></div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="single">Single</button>
        <button class="tab-btn" type="button" data-tab="batch">Batch</button>
        <button class="tab-btn" type="button" data-tab="stored">Αποθηκευμένα</button>
      </div>

      <section id="single" class="tab-content active">
        <div class="stack">
          <div class="field">
            <label for="singleInput">Barcode ή περιγραφή</label>
            <div class="row two">
              <input id="singleInput" type="text" placeholder="π.χ. 5201005080027 ή cotton shirt">
              <button id="btnSingleSearch" type="button">Αναζήτηση</button>
            </div>
          </div>
          <div class="status">Το σύστημα αποθηκεύει μόνο αποτελέσματα που περνούν τον έλεγχο TARIC.</div>
        </div>
      </section>

      <section id="batch" class="tab-content">
        <div class="stack">
          <div class="field">
            <label for="uploadFile">Αρχείο εισαγωγής</label>
            <input id="uploadFile" type="file" accept=".txt,.csv,.tsv,.xlsx">
          </div>
          <div class="controls">
            <button id="btnUploadFile" type="button" class="secondary">Φόρτωση αρχείου</button>
          </div>
          <div class="field">
            <label for="batchInput">Λίστα εισαγωγής</label>
            <textarea id="batchInput" placeholder="Ένα barcode ή περιγραφή ανά γραμμή"></textarea>
          </div>
          <div class="controls">
            <button id="btnBatchSubmit" type="button">Αποστολή batch</button>
          </div>
        </div>
      </section>

      <section id="stored" class="tab-content">
        <div class="stack">
          <div class="controls">
            <button id="btnLoadStored" type="button" class="secondary">Φόρτωση δεδομένων</button>
            <button id="btnCreateStored" type="button">Νέα εγγραφή</button>
            <button id="btnExportStored" type="button" class="success">Εξαγωγή CSV</button>
            <button id="btnClearFilters" type="button" class="danger">Καθαρισμός φίλτρων</button>
          </div>
          <div class="table-bar">
            <div class="table-search field" style="margin:0;">
              <label for="tableSearch">Αναζήτηση στον πίνακα</label>
              <input id="tableSearch" type="text" placeholder="barcode, TARIC, περιγραφή, πηγή...">
            </div>
            <div class="table-info" id="tableInfo">Φόρτωση...</div>
          </div>
          <div id="storedProductsContainer" class="table-wrap">
            <div class="loading"><div class="spinner"></div>Φόρτωση...</div>
          </div>
        </div>
      </section>

      <div id="stats" class="stats">
        <div class="stat"><div id="totalCount" class="value">0</div><div class="label">Αποτελέσματα</div></div>
        <div class="stat"><div id="matchCount" class="value">0</div><div class="label">Επιτυχείς αντιστοιχίσεις</div></div>
        <div class="stat"><div id="successRate" class="value">0%</div><div class="label">Success rate</div></div>
      </div>

      <div id="results" class="results"></div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
      return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function setAiStatus(text) {
      document.getElementById('aiStatus').textContent = text;
    }

    function setLoadingResults(message) {
      document.getElementById('results').innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div>' + escapeHtml(message) + '</div></div>';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(function(section) { section.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function(button) { button.classList.remove('active'); });
      document.getElementById(tabName).classList.add('active');
      document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
      if (tabName === 'stored') {
        loadStoredProducts();
      }
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || 'Request failed');
      }
      return data;
    }

    function getItemsFromBatchText(text) {
      return text.split(/\r?\n/).map(function(value) { return value.trim(); }).filter(Boolean);
    }

    function singleLookup() {
      const input = document.getElementById('singleInput').value.trim();
      if (!input) {
        alert('Παρακαλώ εισάγετε barcode ή περιγραφή');
        return;
      }
      batchLookupInternal([input]);
    }

    function batchLookup() {
      const text = document.getElementById('batchInput').value.trim();
      if (!text) {
        alert('Παρακαλώ εισάγετε items');
        return;
      }
      batchLookupInternal(getItemsFromBatchText(text));
    }

    async function batchLookupInternal(items) {
      const resultsDiv = document.getElementById('results');
      setLoadingResults('Επεξεργασία...');
      setAiStatus('Επεξεργασία...');

      try {
        const data = await fetchJson('/api/lookup', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({items: items, ai_provider: document.getElementById('aiProvider').value})
        });
        displayResults(data.results || []);
      } catch (error) {
        resultsDiv.innerHTML = '<div class="card fail"><strong>Σφάλμα:</strong> ' + escapeHtml(error.message) + '</div>';
        setAiStatus('Σφάλμα');
      }
    }

    function displayResults(results) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      let matchCount = 0;
      results.forEach(function(result) {
        const matched = Boolean(result.match && result.match.taric_code);
        if (matched) {
          matchCount += 1;
        }

        const card = document.createElement('div');
        card.className = 'card ' + (matched ? 'ok' : 'fail');

        let html = '<div class="product-name">' + escapeHtml(result.input || '') + '</div>';
        if (matched) {
          html += '<div class="taric">' + escapeHtml(result.match.taric_code) + '</div>';
          html += '<div class="hs4">HS4: ' + escapeHtml(result.match.hs4 || '-') + '</div>';
          html += '<div class="description">' + escapeHtml(result.match.description || '') + '</div>';
        } else {
          html += '<div class="description" style="color: var(--bad);">Δεν βρέθηκε ασφαλές TARIC match</div>';
        }

        if (result.customs_text) {
          html += '<div class="meta">Customs text: ' + escapeHtml(result.customs_text) + '</div>';
        }
        if (result.validation) {
          html += '<div class="meta">Checked: ' + escapeHtml(String(result.validation.checked)) + ' | Stored: ' + escapeHtml(String(result.validation.stored)) + '</div>';
        }
        if (result.ai_validation && result.ai_validation.checked !== false) {
          const validationStatus = result.ai_validation.approved ? 'approved' : 'reviewed';
          html += '<div class="meta">AI validation: ' + escapeHtml(validationStatus) + ' | ' + escapeHtml(result.ai_validation.reason || '') + '</div>';
        }
        if (result.source && result.source.source) {
          html += '<div class="source">Source: ' + escapeHtml(result.source.source) + '</div>';
        }

        card.innerHTML = html;
        resultsDiv.appendChild(card);
      });

      const total = results.length;
      const rate = total > 0 ? Math.round((matchCount / total) * 100) : 0;
      document.getElementById('stats').style.display = 'grid';
      document.getElementById('totalCount').textContent = total;
      document.getElementById('matchCount').textContent = matchCount;
      document.getElementById('successRate').textContent = rate + '%';
      setAiStatus('Complete: ' + matchCount + '/' + total + ' matched');
    }

    async function uploadFile() {
      const fileInput = document.getElementById('uploadFile');
      if (!fileInput.files.length) {
        alert('Παρακαλώ επιλέξτε ένα αρχείο');
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('ai_provider', document.getElementById('aiProvider').value);

      setLoadingResults('Μεταφόρτωση αρχείου...');
      setAiStatus('Μεταφόρτωση...');

      try {
        const response = await fetchJson('/api/lookup-file', {
          method: 'POST',
          body: formData
        });
        displayResults(response.results || []);
      } catch (error) {
        document.getElementById('results').innerHTML = '<div class="card fail"><strong>Σφάλμα:</strong> ' + escapeHtml(error.message) + '</div>';
        setAiStatus('Σφάλμα');
      }
    }

    function updateTableInfo(visibleCount) {
      const total = window.allProducts ? window.allProducts.length : 0;
      const visible = typeof visibleCount === 'number' ? visibleCount : total;
      document.getElementById('tableInfo').textContent = 'Εμφανιζόμενες: ' + visible + ' / Σύνολο: ' + total;
    }

    async function loadStoredProducts() {
      const container = document.getElementById('storedProductsContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>Φόρτωση αποθηκευμένων εγγραφών...</div>';

      try {
        const data = await fetchJson('/api/stored-products');
        displayStoredProductsTable(data.products || []);
      } catch (error) {
        container.innerHTML = '<div class="empty" style="color: var(--bad);">' + escapeHtml(error.message) + '</div>';
      }
    }

    function collectProductPayload(existing) {
      const current = existing || {};
      const barcodeInput = prompt('Barcode (προαιρετικό):', current.barcode || '');
      if (barcodeInput === null) {
        return null;
      }
      const productName = prompt('Όνομα προϊόντος:', current.product_name || '');
      if (productName === null) {
        return null;
      }
      const description = prompt('Περιγραφή (Ελληνικά):', current.description || '');
      if (description === null) {
        return null;
      }
      const commercialText = prompt('Περιγραφή (Αγγλικά / Commercial text):', current.commercial_text || '');
      if (commercialText === null) {
        return null;
      }
      const productNameEn = prompt('Όνομα προϊόντος (EN, προαιρετικό - auto αν κενό):', current.product_name_en || '');
      if (productNameEn === null) {
        return null;
      }
      const customsText = prompt('Customs text:', current.customs_text || '');
      if (customsText === null) {
        return null;
      }
      const taricCode = prompt('TARIC code:', current.taric_code || '');
      if (taricCode === null) {
        return null;
      }
      const hs4 = prompt('HS4 (προαιρετικό):', current.hs4 || '');
      if (hs4 === null) {
        return null;
      }
      const taricDescription = prompt('Περιγραφή TARIC:', current.taric_description || '');
      if (taricDescription === null) {
        return null;
      }
      const source = prompt('Πηγή:', current.source || 'manual');
      if (source === null) {
        return null;
      }

      return {
        barcode: barcodeInput.trim() || null,
        product_name: productName.trim(),
        product_name_en: productNameEn.trim(),
        description: description.trim(),
        commercial_text: commercialText.trim(),
        customs_text: customsText.trim(),
        taric_code: taricCode.trim() || null,
        hs4: hs4.trim() || null,
        taric_description: taricDescription.trim(),
        source: source.trim() || 'manual'
      };
    }

    async function createStoredProduct() {
      const payload = collectProductPayload();
      if (!payload) {
        return;
      }

      try {
        await fetchJson('/api/stored-products', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        await loadStoredProducts();
      } catch (error) {
        alert('Σφάλμα δημιουργίας εγγραφής: ' + error.message);
      }
    }

    async function editStoredProduct(productId) {
      if (!window.allProducts || !window.allProducts.length) {
        return;
      }
      const existing = window.allProducts.find(function(item) { return Number(item.id) === Number(productId); });
      if (!existing) {
        alert('Η εγγραφή δεν βρέθηκε');
        return;
      }

      const payload = collectProductPayload(existing);
      if (!payload) {
        return;
      }

      try {
        await fetchJson('/api/stored-products/' + encodeURIComponent(String(productId)), {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        await loadStoredProducts();
      } catch (error) {
        alert('Σφάλμα ενημέρωσης εγγραφής: ' + error.message);
      }
    }

    async function deleteStoredProduct(productId) {
      if (!confirm('Να διαγραφεί η εγγραφή;')) {
        return;
      }
      try {
        await fetchJson('/api/stored-products/' + encodeURIComponent(String(productId)), {
          method: 'DELETE'
        });
        await loadStoredProducts();
      } catch (error) {
        alert('Σφάλμα διαγραφής εγγραφής: ' + error.message);
      }
    }

    function renderProductsTable(products) {
      const rows = products.map(function(product) {
        const rowId = Number(product.id) || 0;
        return '<tr>' +
          '<td style="font-family: ui-monospace, monospace; font-weight: 700;">' + escapeHtml(product.barcode || '-') + '</td>' +
          '<td style="font-family: ui-monospace, monospace; font-weight: 700; color: var(--accent);">' + escapeHtml(product.taric_code || '-') + '</td>' +
          '<td>' + escapeHtml(product.hs4 || '-') + '</td>' +
          '<td>' + escapeHtml(product.product_name || '') + '</td>' +
          '<td>' + escapeHtml(product.product_name_en || '') + '</td>' +
          '<td>' + escapeHtml(product.description || '') + '</td>' +
          '<td>' + escapeHtml(product.commercial_text || '') + '</td>' +
          '<td>' + escapeHtml(product.source || '') + '</td>' +
          '<td><div class="action-buttons"><button type="button" class="edit-btn" onclick="editStoredProduct(' + rowId + ')">Edit</button><button type="button" class="delete-btn" onclick="deleteStoredProduct(' + rowId + ')">Delete</button></div></td>' +
        '</tr>';
      }).join('');

      return '<div class="table-wrap"><table id="productsTable"><thead><tr>' +
        '<th data-column="barcode">Barcode</th>' +
        '<th data-column="taric_code">TARIC</th>' +
        '<th data-column="hs4">HS4</th>' +
        '<th data-column="product_name">Προϊόν</th>' +
        '<th data-column="product_name_en">Προϊόν (EN)</th>' +
        '<th data-column="description">Περιγραφή (ΕΛ)</th>' +
        '<th data-column="commercial_text">Περιγραφή (EN)</th>' +
        '<th data-column="source">Πηγή</th>' +
        '<th>Ενέργειες</th>' +
      '</tr></thead><tbody id="productsTableBody">' + rows + '</tbody></table></div>' +
      '<div class="status"><span class="pill">Records</span><span>Σύνολο εγγραφών: <strong id="totalRecords">' + products.length + '</strong> | Εμφανιζόμενες: <strong id="visibleRecords">' + products.length + '</strong></span></div>';
    }

    function displayStoredProductsTable(products) {
      const container = document.getElementById('storedProductsContainer');
      if (!products || products.length === 0) {
        container.innerHTML = '<div class="empty">Δεν υπάρχουν αποθηκευμένες εγγραφές</div>';
        window.allProducts = [];
        updateTableInfo(0);
        return;
      }

      window.allProducts = products.slice();
      window.sortConfig = { key: 'barcode', direction: 'asc' };
      container.innerHTML = renderProductsTable(window.allProducts);
      bindTableSortHandlers();
      updateTableInfo(window.allProducts.length);
    }

    function bindTableSortHandlers() {
      document.querySelectorAll('#productsTable thead th').forEach(function(header) {
        if (!header.dataset.column) {
          return;
        }
        header.addEventListener('click', function() {
          sortTable(header.dataset.column);
        });
      });
    }

    function sortTable(column) {
      if (!window.allProducts || !window.allProducts.length) {
        return;
      }

      if (window.sortConfig.key === column) {
        window.sortConfig.direction = window.sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        window.sortConfig.key = column;
        window.sortConfig.direction = 'asc';
      }

      window.allProducts.sort(function(left, right) {
        let leftValue = left[column] || '';
        let rightValue = right[column] || '';

        const leftNumber = Number(leftValue);
        const rightNumber = Number(rightValue);
        if (!Number.isNaN(leftNumber) && !Number.isNaN(rightNumber) && leftValue !== '' && rightValue !== '') {
          leftValue = leftNumber;
          rightValue = rightNumber;
        } else {
          leftValue = String(leftValue).toLowerCase();
          rightValue = String(rightValue).toLowerCase();
        }

        if (leftValue < rightValue) {
          return window.sortConfig.direction === 'asc' ? -1 : 1;
        }
        if (leftValue > rightValue) {
          return window.sortConfig.direction === 'asc' ? 1 : -1;
        }
        return 0;
      });

      document.getElementById('storedProductsContainer').innerHTML = renderProductsTable(window.allProducts);
      bindTableSortHandlers();
      filterTable();
    }

    function filterTable() {
      const searchInput = document.getElementById('tableSearch').value.trim().toLowerCase();
      const tbody = document.getElementById('productsTableBody');
      if (!tbody) {
        return;
      }

      let visibleCount = 0;
      Array.from(tbody.rows).forEach(function(row) {
        const rowMatches = searchInput === '' || Array.from(row.cells).some(function(cell) {
          return cell.textContent.toLowerCase().includes(searchInput);
        });
        row.style.display = rowMatches ? '' : 'none';
        if (rowMatches) {
          visibleCount += 1;
        }
      });

      updateTableInfo(visibleCount);
    }

    function clearTableFilters() {
      document.getElementById('tableSearch').value = '';
      if (window.allProducts) {
        displayStoredProductsTable(window.allProducts);
      }
    }

    async function exportStoredProducts() {
      try {
        const data = await fetchJson('/api/stored-products');
        let products = data.products || [];
        if (!products.length) {
          alert('Δεν υπάρχουν αποθηκευμένες εγγραφές για εξαγωγή');
          return;
        }

        const filterText = document.getElementById('tableSearch').value.trim().toLowerCase();
        if (filterText) {
          products = products.filter(function(product) {
            return [product.barcode, product.taric_code, product.hs4, product.product_name, product.description, product.commercial_text, product.source]
              .concat([product.product_name_en])
              .map(function(value) { return String(value || '').toLowerCase(); })
              .some(function(value) { return value.includes(filterText); });
          });
        }

        if (!products.length) {
          alert('Κανένα αποτέλεσμα για εξαγωγή με το τρέχον φίλτρο');
          return;
        }

        const header = ['Barcode', 'TARIC', 'HS4', 'Προϊόν', 'Προϊόν (EN)', 'Περιγραφή (ΕΛ)', 'Περιγραφή (EN)', 'Πηγή'];
        const csvRows = [header.map(function(cell) { return '"' + cell.replace(/"/g, '""') + '"'; }).join(',')];
        products.forEach(function(product) {
          const row = [product.barcode || '', product.taric_code || '', product.hs4 || '', product.product_name || '', product.product_name_en || '', product.description || '', product.commercial_text || '', product.source || '']
            .map(function(cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; })
            .join(',');
          csvRows.push(row);
        });

        const blob = new Blob([csvRows.join('\n')], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'stored_products_' + new Date().toISOString().slice(0, 10) + '.csv';
        link.click();
      } catch (error) {
        alert('Σφάλμα κατά την εξαγωγή: ' + error.message);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('[data-tab]').forEach(function(button) {
        button.addEventListener('click', function() {
          switchTab(button.dataset.tab);
        });
      });

      document.getElementById('btnSingleSearch').addEventListener('click', singleLookup);
      document.getElementById('btnUploadFile').addEventListener('click', uploadFile);
      document.getElementById('btnBatchSubmit').addEventListener('click', batchLookup);
      document.getElementById('btnLoadStored').addEventListener('click', loadStoredProducts);
      document.getElementById('btnCreateStored').addEventListener('click', createStoredProduct);
      document.getElementById('btnExportStored').addEventListener('click', exportStoredProducts);
      document.getElementById('btnClearFilters').addEventListener('click', clearTableFilters);
      document.getElementById('singleInput').addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          singleLookup();
        }
      });
      document.getElementById('tableSearch').addEventListener('input', filterTable);
    });
  </script>
</body>
</html>
